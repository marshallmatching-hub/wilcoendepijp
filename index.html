<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Wilco en de Pijp</title>

<style>
*{box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050505;color:#fff;font-family:system-ui}
button{touch-action:none}

.app{height:100dvh;display:grid;grid-template-rows:auto 1fr auto;gap:8px;padding:10px}
.hud{display:grid;gap:6px}
h1{margin:0;font-size:clamp(22px,6vw,38px)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.card{background:#111;padding:8px;border-radius:12px}
.value{font-size:18px;font-weight:700}
.bar{height:10px;background:#333;border-radius:10px;overflow:hidden}
.fill{height:100%;width:0%;background:linear-gradient(90deg,#0f0,#ff0,#f00)}

.stage{position:relative;width:100%;height:100%;border-radius:20px;overflow:hidden;background:#7bdcff}
canvas{width:100%;height:100%}

.controls{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ctrl{height:60px;font-size:24px;border-radius:12px;border:none;background:#222;color:#fff}
.ctrl.primary{background:#ff4d2e}

.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4)}
.modal{background:#111;padding:20px;border-radius:16px;text-align:center}
.hidden{display:none}
</style>
</head>

<body>
<div class="app">
  <div class="hud">
    <h1>Wilco en de Pijp</h1>
    <div class="stats">
      <div class="card"><div class="value" id="score">0</div></div>
      <div class="card"><div class="value" id="pipes">0</div></div>
      <div class="card"><div class="value" id="status">Chill</div></div>
      <div class="card"><div class="value" id="highscore">0</div></div>
    </div>
    <div class="bar"><div class="fill" id="fill"></div></div>
  </div>

  <div class="stage">
    <canvas id="game"></canvas>

    <div class="overlay" id="start">
      <div class="modal">
        <h2>Start</h2>
        <button id="startBtn">Play</button>
      </div>
    </div>

    <div class="overlay hidden" id="over">
      <div class="modal">
        <h2>Game Over</h2>
        <button id="restartBtn">Retry</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl" id="duck">⬇️</button>
    <button class="ctrl primary" id="jump">⬆️</button>
  </div>
</div>

<script>
const c=document.getElementById("game"),ctx=c.getContext("2d");
const scoreEl=document.getElementById("score");
const pipesEl=document.getElementById("pipes");
const fillEl=document.getElementById("fill");
const statusEl=document.getElementById("status");
const highEl=document.getElementById("highscore");

let W=1200,H=600,GROUND=500;
let running=false,score=0,pipes=0,parra=0,speed=5.5;
let highscore=Number(localStorage.getItem("hs")||0);

let player={x:200,y:420,w:40,h:80,vy:0,grounded:true,duck:false};
let keys={jump:false,duck:false};

let obstacles=[],pipesArr=[],cooldown=200;

function resize(){
  const r=c.parentElement.getBoundingClientRect();
  c.width=r.width; c.height=r.height;
}
resize(); window.onresize=resize;

function reset(){
  running=true;score=0;pipes=0;parra=0;speed=5.5;
  obstacles=[];pipesArr=[];cooldown=200;
  player.y=420;player.vy=0;
}

function spawnObstacle(){
  obstacles.push({x:W+100,w:50,h:50});
}

function spawnPipe(){
  pipesArr.push({x:W+100,y:350});
}

function update(){
  if(!running)return;

  score++; parra+=0.01;
  speed=5.5+score*0.0005;

  cooldown-=speed;
  if(cooldown<0){
    spawnObstacle();
    if(Math.random()<0.4)spawnPipe();
    cooldown=200+Math.random()*200;
  }

  if(keys.jump && player.grounded){
    player.vy=-15;
    player.grounded=false;
  }

  player.vy+=0.8;
  player.y+=player.vy;

  if(player.y>=420){
    player.y=420;
    player.vy=0;
    player.grounded=true;
  }

  player.h=keys.duck?50:80;

  obstacles.forEach(o=>o.x-=speed);
  pipesArr.forEach(p=>p.x-=speed);

  obstacles.forEach(o=>{
    if(player.x<o.x+o.w && player.x+player.w>o.x && player.y+player.h>GROUND-o.h){
      gameOver();
    }
  });

  pipesArr.forEach((p,i)=>{
    if(Math.abs(player.x-p.x)<30){
      pipes++;
      pipesArr.splice(i,1);
    }
  });

  scoreEl.textContent=score;
  pipesEl.textContent=pipes;
  fillEl.style.width=(parra%100)+"%";
  highEl.textContent=highscore;
  statusEl.textContent=parra<30?"Chill":parra<60?"Raar":"Parra";
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  ctx.fillStyle="#79dcff";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle="#3cbf60";
  ctx.fillRect(0,GROUND,c.width,200);

  ctx.fillStyle="yellow";
  pipesArr.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,10,0,Math.PI*2);
    ctx.fill();
  });

  ctx.fillStyle="red";
  obstacles.forEach(o=>{
    ctx.fillRect(o.x,GROUND-o.h,o.w,o.h);
  });

  ctx.fillStyle="orange";
  ctx.fillRect(player.x,player.y,player.w,player.h);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

function gameOver(){
  running=false;
  if(score>highscore){
    highscore=score;
    localStorage.setItem("hs",highscore);
  }
  document.getElementById("over").classList.remove("hidden");
}

document.getElementById("startBtn").onclick=()=>{
  document.getElementById("start").classList.add("hidden");
  reset();
};

document.getElementById("restartBtn").onclick=()=>{
  document.getElementById("over").classList.add("hidden");
  reset();
};

function bind(btn,key){
  btn.addEventListener("touchstart",e=>{e.preventDefault();keys[key]=true},{passive:false});
  btn.addEventListener("touchend",()=>keys[key]=false);
}

bind(document.getElementById("jump"),"jump");
bind(document.getElementById("duck"),"duck");

document.addEventListener("keydown",e=>{
  if(e.code==="Space")keys.jump=true;
  if(e.code==="ArrowDown")keys.duck=true;
});
document.addEventListener("keyup",e=>{
  if(e.code==="Space")keys.jump=false;
  if(e.code==="ArrowDown")keys.duck=false;
});
</script>
</body>
</html>
